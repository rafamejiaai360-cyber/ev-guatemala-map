name = "ev-guatemala-map"
compatibility_date = "2024-09-23"
main = "worker/index.ts"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"

[vars]
NOTION_REVIEWS_DB_ID = "e039a369825244ba967182120891954e"
NOTION_STATIONS_DB_ID = "c1ba47a910824e1fb9dc96a17d45c471"
# ADMIN_EMAIL: set via: wrangler secret put ADMIN_EMAIL
# JWT_SECRET:  set via: wrangler secret put JWT_SECRET  (usa una cadena aleatoria larga)

[[kv_namespaces]]
binding = "PHOTOS"
id = "73a50969442548e4b83342a93d3ba60d"
# Los usuarios se guardan en este mismo KV con el prefijo "user:"

# Base de datos de producción (estaciones/usuarios/reseñas/suscripciones).
# Esquema: db/schema.sql · Plan de migración: docs/plan-migracion-d1.md
# Staging: ev-guatemala-db-staging (id 933f7752-0065-4fc9-a0c5-e90844ebb69d)
[[d1_databases]]
binding = "DB"
database_name = "ev-guatemala-db"
database_id = "6b0f10a8-59f8-4218-b7c5-6d9f46d722b7"

# Respaldos diarios (Fase 5): export JSON de todas las tablas a R2.
# Retención: 30 diarios + 12 mensuales (día 1). Ver runBackup() en el worker.
[[r2_buckets]]
binding = "BACKUPS"
bucket_name = "ev-gt-backups"

# Cron de mantenimiento nocturno: 08:00 UTC = 02:00 Guatemala.
# Corre respaldo a R2 + recálculo de frescura (verified→stale a los 90 días).
[triggers]
crons = ["0 8 * * *"]

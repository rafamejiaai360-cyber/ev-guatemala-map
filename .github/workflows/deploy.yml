name: Deploy a producción

# Se ejecuta en cada push a main. Requiere el secreto de repo
# CLOUDFLARE_API_TOKEN (Settings → Secrets and variables → Actions).
# Sin ese secreto este workflow falla en el paso de deploy sin efecto
# alguno — no hay riesgo de publicar nada hasta que el token exista.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build

      # Diagnóstico temporal — NO imprime el valor del secreto, solo su
      # longitud en caracteres, para detectar un salto de línea o espacio
      # colado al copiarlo. Quitar este paso una vez resuelto el problema.
      - name: Diagnóstico del token (temporal)
        run: echo "Longitud del token: ${#CLOUDFLARE_API_TOKEN} caracteres"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy con Wrangler
        # --env="" fuerza el ambiente de nivel superior (producción) ahora
        # que wrangler.toml también define [env.staging] — sin esto Wrangler
        # advierte "no target environment was specified" en cada corrida.
        run: npx wrangler deploy --env=""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
